<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Manager - Ticket App</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div class="header">
			<div style="font-weight:700">Ticket System</div>
			<div class="nav">
				<button id="nav-dashboard" class="btn">Dashboard</button>
				<button id="nav-submit" class="btn">Submit Ticket</button>
			</div>
		</div>

		<div class="container">
			<div class="side">
				<button id="side-my" class="side-btn">My Ticket</button>
				<button id="side-b" class="side-btn">Dashboard</button>
				<button id="side-c" class="side-btn">Submit Ticket</button>
			</div>

			<div class="main">
				<!-- Manager view -->
				<section id="manager-view" class="card">
					<h2>Dashboard</h2>
					<div id="manager-content">
						<div id="dashboard-text" class="praise">
							<p>Loading summary…</p>
						</div>

						<div id="my-tickets" class="tickets-list hidden">
							<h3>Submitted Tickets</h3>
							<div id="tickets-container"></div>
						</div>
					</div>
				</section>

				<!-- Submitter view -->
				<section id="submitter-view" class="card hidden">
					<h2>Submit a Ticket</h2>
					<form id="ticket-form">
						<div class="row">
							<label for="name">Name</label>
							<input id="name" name="name" type="text" required />
						</div>

						<div class="row">
							<label for="department">Department</label>
							<select id="department" name="department" required>
								<option value="Department Design">Design</option>
								<option value="UI">UI</option>
								<option value="Security">Security</option>
							</select>
						</div>

						<div class="row">
							<label for="priority">Priority</label>
							<select id="priority" name="priority" required>
								<option>Low</option>
								<option>Mid</option>
								<option>High</option>
								<option>Urgent</option>
							</select>
						</div>

						<div class="row">
							<label for="topic">Topic</label>
							<input id="topic" name="topic" type="text" />
						</div>

						<div class="row">
							<label for="title">Title</label>
							<input id="title" name="title" type="text" required />
						</div>

						<div class="row">
							<label for="description">Description</label>
							<textarea id="description" name="description"></textarea>
						</div>

						<div class="actions">
							<button type="submit" class="primary">Send Ticket</button>
						</div>
					</form>
				</section>
			</div>
		</div>

		<script src="app.js"></script>
	</body>
</html>
